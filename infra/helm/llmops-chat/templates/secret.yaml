apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llmops-chat.fullname" . }}-secrets
  labels:
    {{- include "llmops-chat.labels" . | nindent 4 }}
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | default "pk-lf-CHANGE_ME" | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | default "sk-lf-CHANGE_ME" | quote }}
