# deploy-kind.sh replaces __PUBLIC_IP__ before applying this file.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llmops-chat
  namespace: llmops
spec:
  ingressClassName: nginx
  rules:
    - host: api.__PUBLIC_IP__.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmops-chat
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.__PUBLIC_IP__.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: http
