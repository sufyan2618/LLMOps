# kind cluster for LLMOps on a VPS
# Extra mount maps host /data/models → node /data/models (GGUF PVC hostPath)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: llmops
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Optional direct API access without port-forward
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
    extraMounts:
      - hostPath: /data/models
        containerPath: /data/models
        readOnly: true
        propagation: HostToContainer
