apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llmops-chat
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/LlmOps.git
    targetRevision: main
    path: helm/llmops-chat
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: llmops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Image tag is updated by CI via helm/llmops-chat/values.yaml
