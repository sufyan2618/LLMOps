name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  pull-requests: write

env:
  IMAGE_NAME: llmops-chat
  HELM_VALUES: helm/llmops-chat/values.yaml

jobs:
  # -------------------------------------------------------------------------
  # Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check app evaluation tests

      - name: Ruff format check
        run: ruff format --check app evaluation tests

  # -------------------------------------------------------------------------
  # Tests
  # -------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU-friendly; skip heavy llama until needed)
        run: |
          python -m pip install --upgrade pip
          # Install app deps except llama-cpp for unit tests speed;
          # provide a stub module so imports succeed.
          grep -v 'llama-cpp-python' requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt -r requirements-dev.txt
          mkdir -p /tmp/llama_stub
          printf 'class Llama:\n    def __init__(self, *a, **k): pass\n    def create_chat_completion(self, *a, **k):\n        return {"choices":[{"message":{"content":"stub"}}],"usage":{}}\n' > /tmp/llama_stub/llama_cpp.py
          echo "PYTHONPATH=/tmp/llama_stub:${PYTHONPATH:-}" >> "$GITHUB_ENV"

      - name: Pytest
        env:
          LANGFUSE_ENABLED: "false"
          OTEL_ENABLED: "false"
          METRICS_ENABLED: "true"
        run: pytest -q --junitxml=junit.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: junit.xml

  # -------------------------------------------------------------------------
  # Docker Build
  # -------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHA_SHORT}"
          IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main branches)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') }}
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Save image for Trivy (PR)
        if: github.event_name == 'pull_request'
        run: docker save "${{ env.IMAGE }}:${{ env.TAG }}" -o /tmp/image.tar

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1

  # -------------------------------------------------------------------------
  # Security Scan (Trivy)
  # -------------------------------------------------------------------------
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or load image
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR path uses artifact in parallel job — scanning Dockerfile filesystem mode"
          else
            docker pull "${{ needs.docker-build.outputs.image }}:${{ needs.docker-build.outputs.tag }}"
          fi

      - name: Trivy FS scan (code & Dockerfile deps)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      - name: Trivy image scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.docker-build.outputs.image }}:${{ needs.docker-build.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-report.sarif

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

  # -------------------------------------------------------------------------
  # Push Image is part of docker-build; gate remains explicit
  # -------------------------------------------------------------------------
  push-image:
    name: Push Image
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - name: Confirm image published
        run: |
          echo "Published ${{ needs.docker-build.outputs.image }}:${{ needs.docker-build.outputs.tag }}"
          echo "Digest ${{ needs.docker-build.outputs.digest }}"

  # -------------------------------------------------------------------------
  # Update Helm values
  # -------------------------------------------------------------------------
  update-helm:
    name: Update Helm values
    runs-on: ubuntu-latest
    needs: [push-image, docker-build]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in Helm values
        env:
          IMAGE: ${{ needs.docker-build.outputs.image }}
          TAG: ${{ needs.docker-build.outputs.tag }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path(os.environ["HELM_VALUES"])
          text = path.read_text()
          image = os.environ["IMAGE"]
          tag = os.environ["TAG"]
          text = re.sub(r"(repository:\s*).*", rf"\1{image}", text, count=1)
          text = re.sub(r'(tag:\s*)"[^"]*"', rf'\1"{tag}"', text, count=1)
          path.write_text(text)
          print(path.read_text())
          PY

      - name: Commit Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${HELM_VALUES}"
          if git diff --cached --quiet; then
            echo "No Helm changes"
          else
            git commit -m "chore(release): bump image to ${{ needs.docker-build.outputs.tag }}"
            git push
          fi

  # -------------------------------------------------------------------------
  # ArgoCD Sync
  # -------------------------------------------------------------------------
  argocd-sync:
    name: ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [update-helm]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Sync Argo CD application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_APP: ${{ secrets.ARGOCD_APP }}
        run: |
          if [[ -z "${ARGOCD_SERVER:-}" || -z "${ARGOCD_AUTH_TOKEN:-}" ]]; then
            echo "ARGOCD_SERVER / ARGOCD_AUTH_TOKEN not set — skipping sync (configure secrets to enable)."
            exit 0
          fi
          APP_NAME="${ARGOCD_APP:-llmops-chat}"
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.12.6/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd app sync "${APP_NAME}" --server "${ARGOCD_SERVER}" --auth-token "${ARGOCD_AUTH_TOKEN}" --grpc-web
          argocd app wait "${APP_NAME}" --server "${ARGOCD_SERVER}" --auth-token "${ARGOCD_AUTH_TOKEN}" --grpc-web --health --timeout 300

  # -------------------------------------------------------------------------
  # Deployment smoke (preview / staging URL)
  # -------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [argocd-sync]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment URL
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          if [[ -z "${PREVIEW_URL:-}" ]]; then
            echo "PREVIEW_URL secret not set — skipping smoke against cluster."
            echo "SKIP_SMOKE=1" >> "$GITHUB_ENV"
            exit 0
          fi
          chmod +x scripts/smoke_test.sh
          for i in $(seq 1 30); do
            if curl -fsS "${PREVIEW_URL}/health"; then
              scripts/smoke_test.sh "${PREVIEW_URL}"
              exit 0
            fi
            sleep 10
          done
          echo "Deployment not healthy in time"
          exit 1

  # -------------------------------------------------------------------------
  # Evaluation quality gate (Langfuse scores)
  # -------------------------------------------------------------------------
  evaluation:
    name: Evaluation
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install eval deps
        run: |
          pip install httpx langfuse pydantic pydantic-settings

      - name: Run evaluation dataset + Langfuse scores + quality gate
        env:
          EVAL_API_BASE_URL: ${{ secrets.PREVIEW_URL }}
          EVAL_MIN_AVG_SCORE: "0.9"
          EVAL_MAX_P95_LATENCY_MS: "2000"
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          export LANGFUSE_BASE_URL="${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}"
          if [[ -z "${EVAL_API_BASE_URL:-}" ]]; then
            echo "PREVIEW_URL not set — running evaluator offline unit path only"
            pytest -q tests/test_evaluators.py
            exit 0
          fi
          python evaluation/run_eval.py --use-sdk-experiment

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: evaluation/results/
          if-no-files-found: ignore
