name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  pull-requests: write

env:
  IMAGE_NAME: llmops-chat
  IMAGE_REPOSITORY: docker.io/sufyanliaqat/llmops-chat
  HELM_VALUES: infra/helm/llmops-chat/values.yaml
  BACKEND_DIR: backend

jobs:
  # Lint → Tests → Docker Build → Security Scan (Trivy) → Push Image
  # → Update Helm values → Smoke Test → Evaluation

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check
        working-directory: backend
        run: ruff check app evaluation tests

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app evaluation tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          grep -v 'llama-cpp-python' requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt -r requirements-dev.txt
          mkdir -p /tmp/llama_stub
          printf 'class Llama:\n    def __init__(self, *a, **k): pass\n    def create_chat_completion(self, *a, **k):\n        return {"choices":[{"message":{"content":"stub"}}],"usage":{}}\n' > /tmp/llama_stub/llama_cpp.py
          echo "PYTHONPATH=/tmp/llama_stub:${{ github.workspace }}/backend" >> "$GITHUB_ENV"

      - name: Pytest
        working-directory: backend
        env:
          LANGFUSE_ENABLED: "false"
          OTEL_ENABLED: "false"
          METRICS_ENABLED: "true"
        run: pytest -q --junitxml=junit.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: backend/junit.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHA_SHORT}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push on main branches)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') }}
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        if: github.event_name != 'pull_request'
        run: docker pull "${IMAGE_REPOSITORY}:${{ needs.docker-build.outputs.tag }}"

      # ignore-unfixed: base-image CVEs without an upstream fix should not
      # block the pipeline; they reappear in reports once a fix exists.
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # Report-only image scan: produces SARIF with all findings for code scanning.
      - name: Trivy image scan (SARIF report)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ needs.docker-build.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: sarif
          output: trivy-report.sarif

      # Gate only on vulnerabilities that actually have a fix available.
      - name: Trivy image scan (fail on fixable CRITICAL/HIGH)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ needs.docker-build.outputs.tag }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          skip-setup-trivy: true
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      - name: Upload Trivy SARIF
        if: ${{ !cancelled() && github.event_name != 'pull_request' && hashFiles('trivy-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-report.sarif

  push-image:
    name: Push Image
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - name: Confirm image published
        run: |
          echo "Published ${IMAGE_REPOSITORY}:${{ needs.docker-build.outputs.tag }}"
          echo "Digest ${{ needs.docker-build.outputs.digest }}"

  update-helm:
    name: Update Helm values
    runs-on: ubuntu-latest
    needs: [push-image, docker-build]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in Helm values
        env:
          IMAGE: ${{ env.IMAGE_REPOSITORY }}
          TAG: ${{ needs.docker-build.outputs.tag }}
        run: |
          export IMAGE_REPO="${IMAGE#docker.io/}"
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path(os.environ["HELM_VALUES"])
          text = path.read_text()
          image = os.environ["IMAGE_REPO"]
          tag = os.environ["TAG"]
          text = re.sub(r"(repository:\s*).*", rf"\1{image}", text, count=1)
          text = re.sub(r'(tag:\s*)"[^"]*"', rf'\1"{tag}"', text, count=1)
          path.write_text(text)
          print(path.read_text())
          PY

      - name: Commit Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${HELM_VALUES}"
          if git diff --cached --quiet; then
            echo "No Helm changes"
          else
            git commit -m "chore(release): bump image to ${{ needs.docker-build.outputs.tag }}"
            git push
          fi

  # Deploy is done on the VPS with kind: infra/scripts/deploy-kind.sh
  # CI only smokes/evaluates a reachable PREVIEW_URL after you redeploy.

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [update-helm]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment URL
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          if [[ -z "${PREVIEW_URL:-}" ]]; then
            echo "PREVIEW_URL not set — skip smoke (redeploy on VPS with deploy-kind.sh first)."
            exit 0
          fi
          chmod +x infra/scripts/smoke_test.sh
          for i in $(seq 1 30); do
            if curl -fsS "${PREVIEW_URL}/health"; then
              infra/scripts/smoke_test.sh "${PREVIEW_URL}"
              exit 0
            fi
            sleep 10
          done
          echo "Deployment not healthy in time"
          exit 1

  evaluation:
    name: Evaluation
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install eval deps
        run: pip install httpx langfuse pydantic pydantic-settings pytest

      - name: Run evaluation dataset + Langfuse scores + quality gate
        working-directory: backend
        env:
          EVAL_API_BASE_URL: ${{ secrets.PREVIEW_URL }}
          EVAL_MIN_AVG_SCORE: "0.9"
          EVAL_MAX_P95_LATENCY_MS: "2000"
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          export LANGFUSE_BASE_URL="${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}"
          if [[ -z "${EVAL_API_BASE_URL:-}" ]]; then
            echo "PREVIEW_URL not set — offline evaluator tests only"
            pytest -q tests/test_evaluators.py
            exit 0
          fi
          python evaluation/run_eval.py --use-sdk-experiment

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: backend/evaluation/results/
          if-no-files-found: ignore
